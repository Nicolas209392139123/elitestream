<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELITE STREAM | 1.5 FIX TV</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
<link href="https://unpkg.com/@videojs/themes@1.0.1/dist/fantasy/index.css" rel="stylesheet">

<style>
:root {
    --neon-blue: #00f2ff;
    --neon-green: #39ff14;
    --bg-dark: #020203;
    --sidebar-bg: rgba(15, 15, 20, 0.98);
    --item-padding: 15px;
    --thumb-size: 55px;
}

* { margin:0; padding:0; box-sizing:border-box; font-family:'Rajdhani',sans-serif; outline:none; }

body {
    background: var(--bg-dark);
    color:white;
    height:100vh;
    width:100vw;
    overflow:hidden;
    display:flex;
    flex-direction:column;
}

header {
    height:60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 30px;
    background:#000;
    border-bottom:2px solid rgba(0,242,255,0.2);
}

.logo { font-family:'Orbitron'; font-size:1.2rem; letter-spacing:2px; }
.logo span { color:var(--neon-blue); text-shadow:0 0 10px var(--neon-blue); }

.app-grid {
    display:grid;
    grid-template-columns: 75% 25%;
    flex-grow:1;
    height:calc(100vh - 60px);
}

main { background:#000; padding:10px; display:flex; flex-direction:column; }
.video-js { width: 100% !important; height: 100% !important; border-radius: 10px; }

/* SIDEBAR */
.sidebar { background:var(--sidebar-bg); border-left:2px solid rgba(255,255,255,0.05); padding:15px; overflow-y:auto; }

.channel-item {
    display:flex; align-items:center; gap:15px; padding: var(--item-padding);
    border-radius:12px; cursor:pointer; margin-bottom:12px;
    background:rgba(255,255,255,0.03); border:3px solid transparent;
    transition: 0.2s;
}

.channel-item:focus, .channel-item:hover {
    background:rgba(0,242,255,0.2);
    border-color:var(--neon-blue);
    transform:scale(1.02);
}

.channel-item.active { background:rgba(0,242,255,0.1); border-left:6px solid var(--neon-blue); }

/* LOGOS CORREGIDOS */
.ch-thumb {
    width: var(--thumb-size);
    height: var(--thumb-size);
    background: #f0f0f0; /* Fondo gris claro para que resalten logos oscuros */
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; padding: 4px;
    border: 1px solid rgba(255,255,255,0.1);
}
.ch-thumb img { width: 100%; height: 100%; object-fit: contain; }

/* RESPONSIVE */
@media (max-width:768px){
    .app-grid { display:flex; flex-direction:column; height:auto; overflow:auto; }
    .video-js { height: 230px !important; }
    :root { --thumb-size: 45px; --item-padding: 10px; }
}

@media (min-width: 1600px) {
    :root { --item-padding: 25px; --thumb-size: 85px; }
    .ch-meta h4 { font-size: 1.8rem; }
    .ch-meta p { font-size: 1.2rem; }
}
</style>
</head>

<body>

<header>
    <div class="logo">ELITE<span>STREAM</span></div>
    <div style="color:var(--neon-green)">● 1.5 LOGOS OK</div>
</header>

<div class="app-grid">
    <main>
        <video id="player" class="video-js vjs-theme-fantasy vjs-big-play-centered" controls preload="auto" playsinline></video>
    </main>

    <aside class="sidebar">
        <div id="channel-list">

            <div class="channel-item active" tabindex="2"
                data-url="https://dtkb.envivoslatam.org/tycsports/tracks-v1a1/mono.m3u8?ip=190.175.34.68&token=d729f8b552cf6817bb5d528bbc0f2b28fa5f8abf-03-1776329601-1776275601"
                data-title="TyC Sports HD">
                <div class="ch-thumb">
                    <img src="https://logodownload.org/wp-content/uploads/2018/10/tyc-sports-logo.png" alt="TyC">
                </div>
                <div class="ch-meta">
                    <h4>TyC Sports</h4>
                    <p>Deportes • 1080p</p>
                </div>
            </div>

            <div class="channel-item" tabindex="3"
                data-url="https://pvtn5y.envivoslatam.org/tntsports/tracks-v1a1/mono.m3u8?ip=190.175.34.68&token=c45edaafaf09f9987690fbf323d377a5d989153c-bb-1776329494-1776275494"
                data-title="TNT Sports">
                <div class="ch-thumb">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/TNT_Sports_Argentina_logo.png/640px-TNT_Sports_Argentina_logo.png" alt="TNT">
                </div>
                <div class="ch-meta">
                    <h4>TNT Sports</h4>
                    <p>Fútbol • Premium</p>
                </div>
            </div>

            <div class="channel-item" tabindex="4"
                data-url="https://iaw5b.envivoslatam.org/dsports/tracks-v1a1/mono.m3u8?ip=190.175.34.68&token=a8aa3845b43aec329e1548bc29e02e3ace918806-83-1776329525-1776275525"
                data-title="DSports">
                <div class="ch-thumb">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/DirecTV_Sports_logo.png/640px-DirecTV_Sports_logo.png" alt="DSports">
                </div>
                <div class="ch-meta">
                    <h4>DirecTV Sports</h4>
                    <p>HD • Exclusivo</p>
                </div>
            </div>

        </div>
    </aside>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const player = videojs('player', {
        fluid: true,
        autoplay: false,
        userActions: { hotkeys: true }
    });

    const channels = document.querySelectorAll('.channel-item');

    function loadChannel(url, element) {
        player.src({ src: url, type: 'application/x-mpegURL' });
        player.play().catch(error => console.log("Autoplay bloqueado por el navegador"));
        
        channels.forEach(c => c.classList.remove('active'));
        element.classList.add('active');
    }

    channels.forEach(ch => {
        ch.addEventListener('click', () => loadChannel(ch.dataset.url, ch));
        ch.addEventListener('keydown', (e) => {
            if(e.key === 'Enter') loadChannel(ch.dataset.url, ch);
        });
    });

    loadChannel(channels[0].dataset.url, channels[0]);
});
</script>

</body>
</html>
