<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELITE STREAM | 1.2 FIX TV</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />

<style>
:root {
    --neon-blue: #00f2ff;
    --neon-green: #39ff14;
    --bg-dark: #020203;
    --sidebar-bg: rgba(15, 15, 20, 0.98);
    --plyr-color-main: #00f2ff;
    /* Variables de tamaño dinámicas */
    --item-padding: 18px;
    --font-title: 1.2rem;
    --thumb-size: 55px;
}

* { margin:0; padding:0; box-sizing:border-box; font-family:'Rajdhani',sans-serif; outline:none; }

body {
    background: var(--bg-dark);
    color:white;
    height:100vh;
    width:100vw;
    overflow:hidden;
    display:flex;
    flex-direction:column;
}

/* HEADER */
header {
    height:60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 30px;
    background:#000;
    border-bottom:2px solid rgba(0,242,255,0.2);
}

.logo { font-family:'Orbitron'; font-size:1.2rem; letter-spacing:2px; }
.logo span { color:var(--neon-blue); text-shadow:0 0 10px var(--neon-blue); }
.status-tag { color:var(--neon-green); font-size:0.9rem; }

/* GRID PRINCIPAL */
.app-grid {
    display:grid;
    grid-template-columns: 70% 30%; /* Ajustado para mejor balance */
    flex-grow:1;
    height:calc(100vh - 60px);
}

main { background:#000; display:flex; flex-direction:column; padding:10px; }
.player-container { width:100%; height:80%; border-radius:10px; overflow:hidden; border:2px solid transparent; }
.player-container:focus-within { border-color:var(--neon-blue); }

.stream-info { height:20%; padding:15px; display:flex; flex-direction:column; justify-content:center; }
.stream-info h1 { font-family:'Orbitron'; color:var(--neon-blue); font-size:1.8rem; }

/* SIDEBAR */
.sidebar {
    background:var(--sidebar-bg);
    border-left:2px solid rgba(255,255,255,0.05);
    padding:15px;
    overflow-y:auto;
}

/* BOTONES DE CANAL (Channel Items) */
.channel-item {
    display:flex;
    align-items:center;
    gap:15px;
    padding: var(--item-padding);
    border-radius:12px;
    cursor:pointer;
    margin-bottom:12px;
    background:rgba(255,255,255,0.03);
    border:3px solid transparent;
    transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.channel-item:hover, .channel-item:focus {
    background:rgba(0,242,255,0.2);
    border-color:var(--neon-blue);
    transform: scale(1.02);
}

.channel-item.active {
    background:rgba(0,242,255,0.15);
    border-left:6px solid var(--neon-blue);
}

.ch-thumb {
    width: var(--thumb-size);
    height: var(--thumb-size);
    background:#1a1a1f;
    border-radius:8px;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink: 0;
}

.ch-thumb img { width:80%; height:80%; object-fit:contain; }
.ch-meta h4 { font-size: var(--font-title); }

/* ------------------------------------------------------
   📱 RESPONSIVE: CELULARES (Pantallas pequeñas)
--------------------------------------------------------- */
@media (max-width: 768px) {
    body { overflow: auto; }
    .app-grid { display: flex; flex-direction: column; height: auto; }
    
    /* Botones más compactos para el dedo */
    :root {
        --item-padding: 10px;
        --font-title: 1rem;
        --thumb-size: 45px;
    }

    .player-container { height: 250px; }
    .sidebar { border-left: none; border-top: 2px solid var(--neon-blue); }
    .channel-item { margin-bottom: 8px; }
}

/* ------------------------------------------------------
   🖥️ RESPONSIVE: PC / LAPTOP (Pantallas medianas/grandes)
--------------------------------------------------------- */
@media (min-width: 769px) and (max-width: 1599px) {
    :root {
        --item-padding: 15px;
        --font-title: 1.1rem;
        --thumb-size: 50px;
    }
}

/* ------------------------------------------------------
   📺 RESPONSIVE: SMART TV / MONITORES 4K (Pantallas Gigantes)
--------------------------------------------------------- */
@media (min-width: 1600px) {
    :root {
        /* Botones gigantes para ver a distancia con el control remoto */
        --item-padding: 30px;
        --font-title: 1.8rem;
        --thumb-size: 90px;
    }

    .logo { font-size: 2rem; }
    .status-tag { font-size: 1.5rem; }
    .sidebar h2 { font-size: 1.2rem; }
    .ch-meta p { font-size: 1.2rem; }
    .stream-info h1 { font-size: 3rem; }
    
    .channel-item { margin-bottom: 20px; border-width: 5px; }
    .channel-item:focus { transform: scale(1.1); box-shadow: 0 0 30px rgba(0,242,255,0.4); }
}
</style>
</head>

<body>

<header>
    <div class="logo">ELITE<span>STREAM</span></div>
    <div class="status-tag">● 1.3 FIX TV</div>
</header>

<div class="app-grid">

<main>
    <div class="player-container" tabindex="1">
        <video id="player" playsinline controls></video>
    </div>

    <div class="stream-info">
        <h1 id="stream-title">Selecciona Señal</h1>
        <p id="stream-desc">Cargando la mejor calidad...</p>
    </div>
</main>

<aside class="sidebar">
<h2>LISTA DE CANALES</h2>

<div id="channel-list">

<div class="channel-item active" tabindex="2"
data-url="https://dtkb.envivoslatam.org/tycsports/tracks-v1a1/mono.m3u8?ip=190.175.34.68&token=d729f8b552cf6817bb5d528bbc0f2b28fa5f8abf-03-1776329601-1776275601"
data-title="TyC Sports HD"
data-desc="Fútbol Argentino">

<div class="ch-thumb">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6c/TyC_Sports_logo.png">
</div>

<div class="ch-meta">
<h4>TyC Sports</h4>
<p>Deportes • 1080p</p>
</div>
</div>

<div class="channel-item" tabindex="3"
data-url="https://pvtn5y.envivoslatam.org/tntsports/tracks-v1a1/mono.m3u8?ip=190.175.34.68&token=c45edaafaf09f9987690fbf323d377a5d989153c-bb-1776329494-1776275494"
data-title="TNT Sports"
data-desc="Liga Profesional">

<div class="ch-thumb">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3e/TNT_Sports_Argentina_logo.png">
</div>

<div class="ch-meta">
<h4>TNT Sports</h4>
<p>Fútbol • Premium</p>
</div>
</div>

<div class="channel-item" tabindex="4"
data-url="https://iaw5b.envivoslatam.org/dsports/tracks-v1a1/mono.m3u8?ip=190.175.34.68&token=a8aa3845b43aec329e1548bc29e02e3ace918806-83-1776329525-1776275525"
data-title="DSports"
data-desc="DirecTV exclusivo">

<div class="ch-thumb">
<img src="https://upload.wikimedia.org/wikipedia/commons/5/5c/DirecTV_Sports_logo.png">
</div>

<div class="ch-meta">
<h4>DirecTV Sports</h4>
<p>HD • Exclusivo</p>
</div>
</div>

</div>
</aside>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<script>
document.addEventListener('DOMContentLoaded', () => {

const video = document.querySelector('#player');
const streamTitle = document.querySelector('#stream-title');
const streamDesc = document.querySelector('#stream-desc');
const channels = document.querySelectorAll('.channel-item');

const player = new Plyr(video);

const hls = new Hls();

function updateStream(url,title,desc){
    streamTitle.innerText = title;
    streamDesc.innerText = desc;

    if(Hls.isSupported()){
        hls.loadSource(url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED,()=>video.play());
    } else {
        video.src = url;
        video.play();
    }
}

channels.forEach(channel=>{
    const action = ()=>{
        channels.forEach(c=>c.classList.remove('active'));
        channel.classList.add('active');
        updateStream(channel.dataset.url, channel.dataset.title, channel.dataset.desc);
    };

    channel.addEventListener('click', action);
    channel.addEventListener('keydown', e=>{
        if(e.key === 'Enter') action();
    });
});

updateStream(channels[0].dataset.url, channels[0].dataset.title, channels[0].dataset.desc);

});
</script>

</body>
</html>
