<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELITE STREAM | 1.2 FIX TV</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />

<style>
:root {
    --neon-blue: #00f2ff;
    --neon-green: #39ff14;
    --bg-dark: #020203;
    --sidebar-bg: rgba(15, 15, 20, 0.98);
    --plyr-color-main: #00f2ff;
}

* { margin:0; padding:0; box-sizing:border-box; font-family:'Rajdhani',sans-serif; outline:none; }

body {
    background: var(--bg-dark);
    color:white;
    height:100vh;
    width:100vw;
    overflow:hidden;
    display:flex;
    flex-direction:column;
}

/* HEADER */
header {
    height:60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 30px;
    background:#000;
    border-bottom:2px solid rgba(0,242,255,0.2);
}

.logo { font-family:'Orbitron'; font-size:1.2rem; letter-spacing:2px; }
.logo span { color:var(--neon-blue); text-shadow:0 0 10px var(--neon-blue); }
.status-tag { color:var(--neon-green); font-size:0.9rem; }

/* GRID */
.app-grid {
    display:grid;
    grid-template-columns:75% 25%;
    flex-grow:1;
    height:calc(100vh - 60px);
}

/* PLAYER */
main {
    background:#000;
    display:flex;
    flex-direction:column;
    padding:10px;
}

.player-container {
    width:100%;
    height:80%;
    border-radius:10px;
    overflow:hidden;
    border:2px solid transparent;
}

.player-container:focus-within {
    border-color:var(--neon-blue);
}

.stream-info {
    height:20%;
    padding:15px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.stream-info h1 { font-family:'Orbitron'; color:var(--neon-blue); font-size:1.8rem; }
.stream-info p { color:#888; }

/* SIDEBAR */
.sidebar {
    background:var(--sidebar-bg);
    border-left:2px solid rgba(255,255,255,0.05);
    padding:15px;
    overflow-y:auto;
}

.sidebar h2 {
    font-family:'Orbitron';
    font-size:0.7rem;
    color:#555;
    margin-bottom:15px;
    text-align:center;
}

/* CHANNEL */
.channel-item {
    display:flex;
    align-items:center;
    gap:15px;
    padding:18px;
    border-radius:12px;
    cursor:pointer;
    margin-bottom:12px;
    background:rgba(255,255,255,0.03);
    border:3px solid transparent;
    transition:0.2s;
}

.channel-item:focus {
    background:rgba(0,242,255,0.2);
    border-color:var(--neon-blue);
    transform:scale(1.03);
}

.channel-item.active {
    background:rgba(0,242,255,0.1);
    border-left:6px solid var(--neon-blue);
}

/* LOGOS */
.ch-thumb {
    width:55px;
    height:55px;
    background:#1a1a1f;
    border-radius:8px;
    display:flex;
    align-items:center;
    justify-content:center;
    border:1px solid rgba(255,255,255,0.1);
    overflow:hidden;
}

.ch-thumb img {
    width:100%;
    height:100%;
    object-fit:contain;
}

/* TEXT */
.ch-meta h4 { font-size:1.2rem; }
.ch-meta p { font-size:0.9rem; color:#666; }

.plyr--video .plyr__volume { display:none !important; }

/* 📱 MOBILE FIX */
@media (max-width:768px){

    body { overflow:auto; }

    .app-grid {
        display:flex;
        flex-direction:column;
        height:auto;
    }

    .player-container {
        height:220px;
    }

    .stream-info {
        height:auto;
        padding:10px;
    }

    .stream-info h1 { font-size:1.2rem; }

    .sidebar {
        border-left:none;
        border-top:2px solid rgba(255,255,255,0.05);
    }

    .channel-item {
        padding:12px;
    }

    .ch-thumb {
        width:40px;
        height:40px;
    }
}
</style>
</head>

<body>

<header>
    <div class="logo">ELITE<span>STREAM</span></div>
    <div class="status-tag">● 1.2 FIX TV</div>
</header>

<div class="app-grid">

<main>
    <div class="player-container" tabindex="1">
        <video id="player" playsinline controls></video>
    </div>

    <div class="stream-info">
        <h1 id="stream-title">Selecciona Señal</h1>
        <p id="stream-desc">Cargando la mejor calidad...</p>
    </div>
</main>

<aside class="sidebar">
<h2>LISTA DE CANALES</h2>

<div id="channel-list">

<div class="channel-item active" tabindex="2"
data-url="https://tk0hz.envivoslatam.org/tycsports/tracks-v1a1/mono.m3u8"
data-title="TyC Sports HD"
data-desc="Fútbol Argentino">

<div class="ch-thumb">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6c/TyC_Sports_logo.png">
</div>

<div class="ch-meta">
<h4>TyC Sports</h4>
<p>Deportes • 1080p</p>
</div>
</div>

<div class="channel-item" tabindex="3"
data-url="https://mze7u.envivoslatam.org/tntsports/tracks-v1a1/mono.m3u8"
data-title="TNT Sports"
data-desc="Liga Profesional">

<div class="ch-thumb">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3e/TNT_Sports_Argentina_logo.png">
</div>

<div class="ch-meta">
<h4>TNT Sports</h4>
<p>Fútbol • Premium</p>
</div>
</div>

<div class="channel-item" tabindex="4"
data-url="https://mze7u.envivoslatam.org/dsports/tracks-v1a1/mono.m3u8"
data-title="DSports"
data-desc="DirecTV exclusivo">

<div class="ch-thumb">
<img src="https://upload.wikimedia.org/wikipedia/commons/5/5c/DirecTV_Sports_logo.png">
</div>

<div class="ch-meta">
<h4>DirecTV Sports</h4>
<p>HD • Exclusivo</p>
</div>
</div>

</div>
</aside>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<script>
document.addEventListener('DOMContentLoaded', () => {

const video = document.querySelector('#player');
const streamTitle = document.querySelector('#stream-title');
const streamDesc = document.querySelector('#stream-desc');
const channels = document.querySelectorAll('.channel-item');

const player = new Plyr(video);

const hls = new Hls();

function updateStream(url,title,desc){
    streamTitle.innerText = title;
    streamDesc.innerText = desc;

    if(Hls.isSupported()){
        hls.loadSource(url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED,()=>video.play());
    } else {
        video.src = url;
        video.play();
    }
}

channels.forEach(channel=>{
    const action = ()=>{
        channels.forEach(c=>c.classList.remove('active'));
        channel.classList.add('active');
        updateStream(channel.dataset.url, channel.dataset.title, channel.dataset.desc);
    };

    channel.addEventListener('click', action);
    channel.addEventListener('keydown', e=>{
        if(e.key === 'Enter') action();
    });
});

updateStream(channels[0].dataset.url, channels[0].dataset.title, channels[0].dataset.desc);

});
</script>

</body>
</html>
