<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELITE STREAM | 1.6 MOBILE FIX</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
<link href="https://unpkg.com/@videojs/themes@1.0.1/dist/fantasy/index.css" rel="stylesheet">

<style>
:root {
    --neon-blue: #00f2ff;
    --neon-green: #39ff14;
    --bg-dark: #020203;
    --sidebar-bg: rgba(15, 15, 20, 0.98);
    --item-padding: 15px;
    --thumb-size: 55px;
}

* { margin:0; padding:0; box-sizing:border-box; font-family:'Rajdhani',sans-serif; outline:none; }

body {
    background: var(--bg-dark);
    color:white;
    height:100vh;
    width:100vw;
    overflow:hidden;
    display:flex;
    flex-direction:column;
}

header {
    height:50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 20px;
    background:#000;
    border-bottom:2px solid rgba(0,242,255,0.2);
    flex-shrink: 0;
}

.logo { font-family:'Orbitron'; font-size:1rem; letter-spacing:1px; }
.logo span { color:var(--neon-blue); }

.app-grid {
    display:grid;
    grid-template-columns: 75% 25%;
    flex-grow:1;
    height:calc(100vh - 50px);
}

main { background:#000; padding:10px; display:flex; flex-direction:column; justify-content: center; }
.video-js { width: 100% !important; height: 100% !important; border-radius: 10px; }

/* SIDEBAR */
.sidebar { background:var(--sidebar-bg); border-left:2px solid rgba(255,255,255,0.05); padding:15px; overflow-y:auto; }

.channel-item {
    display:flex; align-items:center; gap:12px; padding: var(--item-padding);
    border-radius:10px; cursor:pointer; margin-bottom:10px;
    background:rgba(255,255,255,0.03); border:2px solid transparent;
    transition: 0.2s;
}

.channel-item.active { background:rgba(0,242,255,0.15); border-color:var(--neon-blue); }

.ch-thumb {
    width: var(--thumb-size);
    height: var(--thumb-size);
    background: #fff;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; padding: 3px;
}
.ch-thumb img { width: 100%; height: 100%; object-fit: contain; }
.ch-meta h4 { font-size: 1rem; }
.ch-meta p { font-size: 0.8rem; color: #888; }

/* -----------------------------------------------------------
   📱 MODO CELULAR HORIZONTAL (LANDSCAPE) - EL FIX QUE PEDISTE
-------------------------------------------------------------- */
@media (max-width: 932px) and (orientation: landscape) {
    header { height: 40px; }
    .app-grid {
        display: grid;
        grid-template-columns: 60% 40%; /* El video ya no ocupa todo el ancho */
        height: calc(100vh - 40px);
    }
    main { padding: 5px; }
    .sidebar { padding: 8px; }

    /* Botones de canales más chicos para que entren más en horizontal */
    :root {
        --thumb-size: 35px;
        --item-padding: 8px;
    }
    .ch-meta h4 { font-size: 0.9rem; }
    .ch-meta p { display: none; } /* Ocultamos descripción para ahorrar espacio */

    .channel-item { margin-bottom: 5px; }
}

/* 📱 MODO CELULAR VERTICAL */
@media (max-width: 768px) and (orientation: portrait) {
    .app-grid { display: flex; flex-direction: column; height: auto; overflow-y: auto; }
    .video-js { height: 230px !important; flex-shrink: 0; }
    :root { --thumb-size: 45px; --item-padding: 10px; }
    body { overflow-y: auto; }
}

/* 📺 MODO TV / PC GIGANTE */
@media (min-width: 1600px) {
    :root { --item-padding: 25px; --thumb-size: 85px; }
    .ch-meta h4 { font-size: 1.8rem; }
}
</style>
</head>

<body>

<header>
    <div class="logo">ELITE<span>STREAM</span></div>
    <div style="color:var(--neon-green); font-size: 0.8rem;">● 1.6 LANDSCAPE FIX</div>
</header>

<div class="app-grid">
    <main id="player-area" tabindex="0" aria-label="Reproductor principal">
        <video id="player" class="video-js vjs-theme-fantasy vjs-big-play-centered" controls preload="auto" playsinline></video>
    </main>

    <aside class="sidebar" aria-label="Lista de canales">
        <div id="channel-list">

            <div class="channel-item active" tabindex="0"
                data-url="https://dtkb.envivoslatam.org/tycsports/tracks-v1a1/mono.m3u8?ip=190.175.34.68&token=d729f8b552cf6817bb5d528bbc0f2b28fa5f8abf-03-1776329601-1776275601"
                data-title="TyC Sports HD">
                <div class="ch-thumb">
                    <img src="https://logodownload.org/wp-content/uploads/2018/10/tyc-sports-logo.png" alt="TyC">
                </div>
                <div class="ch-meta">
                    <h4>TyC Sports</h4>
                    <p>Deportes • 1080p</p>
                </div>
            </div>

            <div class="channel-item" tabindex="-1"
                data-url="https://pvtn5y.envivoslatam.org/tntsports/tracks-v1a1/mono.m3u8?ip=190.175.34.68&token=c45edaafaf09f9987690fbf323d377a5d989153c-bb-1776329494-1776275494"
                data-title="TNT Sports">
                <div class="ch-thumb">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/TNT_Sports_Argentina_logo.png/640px-TNT_Sports_Argentina_logo.png" alt="TNT">
                </div>
                <div class="ch-meta">
                    <h4>TNT Sports</h4>
                    <p>Fútbol • Premium</p>
                </div>
            </div>

            <div class="channel-item" tabindex="-1"
                data-url="https://iaw5b.envivoslatam.org/dsports/tracks-v1a1/mono.m3u8?ip=190.175.34.68&token=a8aa3845b43aec329e1548bc29e02e3ace918806-83-1776329525-1776275525"
                data-title="DSports">
                <div class="ch-thumb">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/DirecTV_Sports_logo.png/640px-DirecTV_Sports_logo.png" alt="DSports">
                </div>
                <div class="ch-meta">
                    <h4>DSports</h4>
                    <p>HD • Exclusivo</p>
                </div>
            </div>

        </div>
    </aside>
</div>

<p id="tv-live-status" hidden aria-live="polite"></p>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const player = videojs('player', {
        fluid: true,
        autoplay: false,
        userActions: { hotkeys: false }
    });

    const playerArea = document.getElementById('player-area');
    const liveStatus = document.getElementById('tv-live-status');
    const channels = Array.from(document.querySelectorAll('.channel-item'));
    const directKeys = ['1', '2', '3', '4', '5', '6', '7', '8', '9'];
    let focusedIndex = 0;
    let lastListIndex = 0;

    function announce(message) {
        liveStatus.textContent = message;
    }

    function syncTabIndex(activeElement) {
        channels.forEach(channel => {
            channel.tabIndex = channel === activeElement ? 0 : -1;
        });
    }

    function focusPlayer() {
        playerArea.focus({ preventScroll: true });
        player.userActive(true);
        announce('Reproductor enfocado');
    }

    function focusChannel(index) {
        const safeIndex = Math.max(0, Math.min(index, channels.length - 1));
        const channel = channels[safeIndex];

        focusedIndex = safeIndex;
        lastListIndex = safeIndex;
        syncTabIndex(channel);
        channel.focus({ preventScroll: true });
        channel.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        announce('Canal seleccionado: ' + channel.dataset.title);
    }

    function getActiveIndex() {
        const activeIndex = channels.findIndex(channel => channel.classList.contains('active'));
        return activeIndex === -1 ? 0 : activeIndex;
    }

    function loadChannel(url, element, options = {}) {
        const { autoplay = true, focusPlayerAfterLoad = false } = options;
        const nextIndex = channels.indexOf(element);

        if (nextIndex === -1) {
            return;
        }

        player.src({ src: url, type: 'application/x-mpegURL' });

        if (autoplay) {
            player.play().catch(() => {});
        }

        channels.forEach(channel => channel.classList.remove('active'));
        element.classList.add('active');

        focusedIndex = nextIndex;
        lastListIndex = nextIndex;
        syncTabIndex(element);
        announce('Canal cargado: ' + element.dataset.title);

        if (focusPlayerAfterLoad) {
            requestAnimationFrame(focusPlayer);
        }
    }

    function changeChannel(step) {
        const currentIndex = getActiveIndex();
        const nextIndex = (currentIndex + step + channels.length) % channels.length;
        const shouldReturnToPlayer = document.activeElement === playerArea;

        loadChannel(channels[nextIndex].dataset.url, channels[nextIndex], {
            focusPlayerAfterLoad: shouldReturnToPlayer
        });

        if (!shouldReturnToPlayer) {
            focusChannel(nextIndex);
        }
    }

    function togglePlayback() {
        if (player.paused()) {
            player.play().catch(() => {});
            announce('Reproduciendo');
            return;
        }

        player.pause();
        announce('Pausado');
    }

    function toggleMute() {
        player.muted(!player.muted());
        announce(player.muted() ? 'Silenciado' : 'Sonido activado');
    }

    function toggleFullscreen() {
        if (player.isFullscreen()) {
            player.exitFullscreen();
            announce('Saliendo de pantalla completa');
            return;
        }

        player.requestFullscreen();
        announce('Pantalla completa');
    }

    function jumpToChannelByNumber(key) {
        const index = Number(key) - 1;

        if (index < 0 || index >= channels.length) {
            return;
        }

        loadChannel(channels[index].dataset.url, channels[index], {
            focusPlayerAfterLoad: true
        });
    }

    channels.forEach((channel, index) => {
        channel.setAttribute('role', 'button');
        channel.setAttribute('aria-label', channel.dataset.title + ', canal ' + (index + 1));

        channel.addEventListener('click', () => {
            loadChannel(channel.dataset.url, channel, { focusPlayerAfterLoad: true });
        });

        channel.addEventListener('focus', () => {
            focusedIndex = index;
            lastListIndex = index;
            syncTabIndex(channel);
        });

        channel.addEventListener('keydown', event => {
            if (event.key === 'ArrowUp') {
                event.preventDefault();
                focusChannel((index - 1 + channels.length) % channels.length);
                return;
            }

            if (event.key === 'ArrowDown') {
                event.preventDefault();
                focusChannel((index + 1) % channels.length);
                return;
            }

            if (event.key === 'ArrowLeft' || event.key === 'Escape' || event.key === 'Backspace') {
                event.preventDefault();
                focusPlayer();
                return;
            }

            if (event.key === 'Enter' || event.key === ' ') {
                event.preventDefault();
                loadChannel(channel.dataset.url, channel, { focusPlayerAfterLoad: true });
                return;
            }

            if (event.key === 'Home') {
                event.preventDefault();
                focusChannel(0);
                return;
            }

            if (event.key === 'End') {
                event.preventDefault();
                focusChannel(channels.length - 1);
                return;
            }

            if (event.key === 'PageUp' || event.key === 'MediaTrackPrevious') {
                event.preventDefault();
                changeChannel(-1);
                return;
            }

            if (event.key === 'PageDown' || event.key === 'MediaTrackNext') {
                event.preventDefault();
                changeChannel(1);
                return;
            }

            if (directKeys.includes(event.key)) {
                event.preventDefault();
                jumpToChannelByNumber(event.key);
            }
        });
    });

    playerArea.addEventListener('keydown', event => {
        if (event.key === 'ArrowRight') {
            event.preventDefault();
            focusChannel(lastListIndex);
            return;
        }

        if (event.key === 'ArrowUp' || event.key === 'PageUp' || event.key === 'MediaTrackPrevious') {
            event.preventDefault();
            changeChannel(-1);
            return;
        }

        if (event.key === 'ArrowDown' || event.key === 'PageDown' || event.key === 'MediaTrackNext') {
            event.preventDefault();
            changeChannel(1);
            return;
        }

        if (event.key === 'Enter' || event.key === ' ' || event.key === 'MediaPlayPause' || event.key.toLowerCase() === 'k') {
            event.preventDefault();
            togglePlayback();
            return;
        }

        if (event.key.toLowerCase() === 'm') {
            event.preventDefault();
            toggleMute();
            return;
        }

        if (event.key.toLowerCase() === 'f' || event.key === 'F11') {
            event.preventDefault();
            toggleFullscreen();
            return;
        }

        if (directKeys.includes(event.key)) {
            event.preventDefault();
            jumpToChannelByNumber(event.key);
        }
    });

    player.on('play', () => announce('Reproduciendo'));
    player.on('pause', () => announce('Pausado'));
    player.on('volumechange', () => {
        announce(player.muted() ? 'Silenciado' : 'Volumen actualizado');
    });

    loadChannel(channels[0].dataset.url, channels[0], { focusPlayerAfterLoad: true });
});
</script>

</body>
</html>
